<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - The Aimers</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { max-width: 400px; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div class="card auth-card">
        <h1 class="logo" style="margin-bottom: 0.5rem;">The Aimers</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Student Portal Login</p>
        
        <form id="loginForm" action="dashboard.html">
            <input type="email" placeholder="Student Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn" style="width: 100%;">Enter Portal</button>
        </form>
        
        <p style="margin-top: 1.5rem; font-size: 0.9rem;">
            New student? <a href="#" style="color: var(--primary);">Register here</a>
        </p>
    </div>
</body>
</html>
